document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"4e0e681d-a6fd-4c4b-a81f-25ba35f1a68c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n:root {\n  /* canvas — deep navy solid */\n  --bg:        #070B17;\n  --paper:     #0F1727;\n  --paper-2:   #0B1220;\n  --sunk:      #0A101D;\n  --line:      #1B2640;\n  --line-2:    #2A3656;\n  --line-soft: #131C32;\n\n  /* ink */\n  --ink:       #EAEFF9;\n  --ink-2:     #B4BDD2;\n  --ink-3:     #7A859E;\n  --ink-4:     #525E78;\n  --ink-5:     #3A4660;\n\n  /* brand */\n  --blue:      #4E7BFF;    /* bluebird, brightened for dark */\n  --blue-2:    #2A55E0;\n  --blue-soft: rgba(78,123,255,0.18);\n  --blue-tint: rgba(78,123,255,0.08);\n\n  /* states (muted but readable on dark) */\n  --pos:       #34C77E;\n  --pos-soft:  rgba(52,199,126,0.14);\n  --neg:       #E66767;\n  --neg-soft:  rgba(230,103,103,0.14);\n  --warn:      #E6B36B;\n  --warn-soft: rgba(230,179,107,0.14);\n  --plum:      #B49AE0;\n  --plum-soft: rgba(180,154,224,0.14);\n  --teal:      #5FC2D2;\n  --teal-soft: rgba(95,194,210,0.14);\n\n  /* shapes */\n  --r-lg: 14px;\n  --r-md: 10px;\n  --r-sm: 8px;\n  --shadow-1: 0 1px 0 rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.4);\n  --shadow-2: 0 8px 24px -10px rgba(0,0,0,0.6);\n  --shadow-3: 0 40px 80px -30px rgba(0,0,0,0.7), 0 8px 24px -8px rgba(0,0,0,0.5);\n\n  --font-serif: 'Instrument Serif', 'Times New Roman', serif;\n  --font-sans:  'Geist', 'IBM Plex Sans Thai', system-ui, -apple-system, sans-serif;\n  --font-thai:  'IBM Plex Sans Thai', 'Geist', system-ui, sans-serif;\n  --font-mono:  'JetBrains Mono', ui-monospace, monospace;\n}\n\n* , *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\nhtml, body { background: var(--bg); }\nbody {\n  font-family: var(--font-thai);\n  color: var(--ink);\n  min-height: 100vh;\n  font-size: 14px;\n  line-height: 1.55;\n  font-feature-settings: 'ss01','cv11';\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\nbutton, input, select, textarea { font-family: inherit; color: inherit; }\na { color: inherit; }\n\n::-webkit-scrollbar { width: 10px; height: 10px; }\n::-webkit-scrollbar-track { background: transparent; }\n::-webkit-scrollbar-thumb { background: var(--line-2); border: 3px solid var(--bg); border-radius: 99px; }\n::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }\n\n/* ───────── BRAND MARK ───────── */\n.mark {\n  display: inline-flex; align-items: center; gap: 11px;\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-weight: 400;\n  color: var(--ink);\n  line-height: 1;\n  letter-spacing: -0.01em;\n}\n.mark .logo-badge {\n  width: 44px; height: 44px;\n  border-radius: 50%;\n  display: grid; place-items: center;\n  overflow: hidden;\n  box-shadow: 0 0 0 1px rgba(78,123,255,0.35), 0 8px 24px -8px rgba(78,123,255,0.5);\n  flex-shrink: 0;\n  aspect-ratio: 1 / 1;\n}\n.mark .logo-badge img { width: 100%; height: 100%; object-fit: contain; display: block; }\n.mark .logo-badge.sm { width: 34px; height: 34px; }\n.mark .word { font-size: 24px; color: var(--ink); }\n.mark .est { font-family: var(--font-mono); font-style: normal; font-size: 10px;\n  color: var(--ink-4); letter-spacing: 0.18em; text-transform: uppercase;\n  padding: 3px 8px; border: 1px solid var(--line); border-radius: 99px; }\n\n/* Hero logo — big circular badge with glow */\n.hero-mark {\n  width: 180px; height: 180px;\n  aspect-ratio: 1 / 1;\n  border-radius: 50%;\n  display: grid; place-items: center;\n  margin-bottom: 8px;\n  position: relative;\n  box-shadow:\n    0 0 0 1px rgba(78,123,255,0.4),\n    0 0 60px -10px rgba(78,123,255,0.55),\n    0 24px 60px -20px rgba(0,0,0,0.6);\n}\n.hero-mark::before {\n  content: ''; position: absolute; inset: -3px;\n  border-radius: 50%;\n  background: conic-gradient(from 0deg, transparent 0deg, rgba(78,123,255,0.6) 90deg, transparent 180deg, rgba(78,123,255,0.3) 270deg, transparent 360deg);\n  z-index: -1;\n  animation: spin 18s linear infinite;\n}\n@keyframes spin { to { transform: rotate(360deg); } }\n.hero-mark img { width: 100%; height: 100%; object-fit: contain; display: block; border-radius: 50%; }\n\n/* ───────── PROFILE / LANDING ───────── */\n#profile-screen {\n  position: relative;\n  min-height: 100vh;\n  padding: 28px clamp(20px, 5vw, 56px) 80px;\n  overflow: hidden;\n}\n#profile-screen::before, #profile-screen::after {\n  content: ''; position: absolute; pointer-events: none; z-index: 0;\n}\n#profile-screen::before {\n  inset: -240px -240px auto auto;\n  width: 820px; height: 820px;\n  background: radial-gradient(closest-side, rgba(78,123,255,0.22), rgba(78,123,255,0) 70%);\n  filter: blur(12px);\n}\n#profile-screen::after {\n  inset: auto auto -280px -240px;\n  width: 680px; height: 680px;\n  background: radial-gradient(closest-side, rgba(78,123,255,0.12), rgba(78,123,255,0) 70%);\n}\n.ls-top {\n  position: relative; z-index: 1;\n  display: flex; align-items: center; justify-content: space-between;\n  padding-bottom: 24px;\n  border-bottom: 1px solid var(--line);\n}\n.ls-top .right {\n  display: flex; gap: 12px; align-items: center;\n  font-family: var(--font-mono); font-size: 11px;\n  color: var(--ink-3); letter-spacing: 0.12em; text-transform: uppercase;\n}\n.ls-top .right .dot {\n  width: 6px; height: 6px; border-radius: 50%; background: var(--pos);\n  box-shadow: 0 0 0 4px rgba(31,138,91,0.12);\n}\n\n.ls-hero {\n  position: relative; z-index: 1;\n  padding: clamp(36px, 8vw, 72px) 0 clamp(28px, 5vw, 48px);\n  display: grid; grid-template-columns: 1fr; gap: 22px;\n  justify-items: start;\n}\n.ls-eyebrow {\n  font-family: var(--font-mono);\n  font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;\n  color: var(--blue);\n  display: flex; align-items: center; gap: 12px;\n}\n.ls-eyebrow::before {\n  content: ''; width: 28px; height: 1px; background: var(--blue); display: inline-block;\n}\n.ls-title {\n  font-family: var(--font-serif);\n  font-weight: 400;\n  font-size: clamp(56px, 11vw, 132px);\n  line-height: 0.95;\n  letter-spacing: -0.025em;\n  color: var(--ink);\n}\n.ls-title em { font-style: italic; color: var(--blue); }\n.ls-sub {\n  max-width: 540px;\n  color: var(--ink-2);\n  font-size: 15px;\n  line-height: 1.65;\n}\n.ls-meta {\n  display: flex; gap: 24px; flex-wrap: wrap;\n  font-family: var(--font-mono); font-size: 11px;\n  color: var(--ink-3); letter-spacing: 0.14em; text-transform: uppercase;\n}\n.ls-meta span { display: inline-flex; gap: 8px; align-items: center; }\n.ls-meta b { color: var(--ink); font-weight: 500; }\n\n.ls-divider {\n  position: relative; z-index: 1;\n  display: flex; align-items: center; gap: 16px;\n  margin: 14px 0 22px;\n  color: var(--ink-3);\n  font-family: var(--font-mono); font-size: 10px;\n  letter-spacing: 0.24em; text-transform: uppercase;\n}\n.ls-divider::before, .ls-divider::after {\n  content: ''; flex: 1; height: 1px; background: var(--line);\n}\n\n.profile-grid {\n  position: relative; z-index: 1;\n  display: grid;\n  grid-template-columns: repeat(auto-fill, minmax(252px, 1fr));\n  gap: 14px;\n}\n.profile-card {\n  position: relative;\n  background: var(--paper);\n  border: 1px solid var(--line);\n  border-radius: var(--r-lg);\n  padding: 22px 22px 20px;\n  cursor: pointer;\n  transition: transform .25s cubic-bezier(.2,.7,.2,1), box-shadow .25s, border-color .2s;\n  overflow: hidden;\n}\n.profile-card::after {\n  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;\n  background: linear-gradient(180deg, var(--blue), var(--blue-2));\n  opacity: 0; transition: opacity .2s;\n}\n.profile-card:hover {\n  transform: translateY(-2px);\n  box-shadow: var(--shadow-2);\n  border-color: var(--line-2);\n}\n.profile-card:hover::after { opacity: 1; }\n.pc-row {\n  display: flex; align-items: center; gap: 14px; margin-bottom: 18px;\n}\n.profile-avatar {\n  width: 50px; height: 50px;\n  aspect-ratio: 1 / 1;\n  border-radius: 50%;\n  display: grid; place-items: center;\n  font-size: 26px; line-height: 1;\n  background: var(--blue-tint);\n  color: var(--blue);\n  flex-shrink: 0;\n  border: 1px solid var(--line);\n}\n.profile-name {\n  font-family: var(--font-serif);\n  font-size: 22px;\n  font-style: italic;\n  font-weight: 400;\n  letter-spacing: -0.01em;\n  color: var(--ink);\n}\n.profile-tagid {\n  font-family: var(--font-mono); font-size: 10px;\n  color: var(--ink-4); letter-spacing: 0.16em; text-transform: uppercase;\n  margin-top: 2px;\n}\n.pc-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; padding-top: 14px; border-top: 1px solid var(--line); }\n.pc-stat { display: flex; flex-direction: column; gap: 2px; }\n.pc-stat + .pc-stat { padding-left: 14px; border-left: 1px solid var(--line); }\n.pc-stat-l { font-family: var(--font-mono); font-size: 9px; color: var(--ink-4); letter-spacing: 0.15em; text-transform: uppercase; }\n.pc-stat-v { font-family: var(--font-serif); font-size: 22px; line-height: 1.1; color: var(--ink); letter-spacing: -0.01em; }\n.pc-stat-v.pos { color: var(--pos); }\n.pc-stat-v.neg { color: var(--neg); }\n.pc-stat-v .pct { font-family: var(--font-mono); font-size: 11px; vertical-align: 1px; opacity: .65; }\n\n.profile-del {\n  position: absolute; top: 12px; right: 12px;\n  width: 28px; height: 28px;\n  background: var(--sunk); border: 1px solid var(--line);\n  border-radius: 8px; cursor: pointer;\n  color: var(--ink-4); font-size: 12px; line-height: 1;\n  display: grid; place-items: center;\n  opacity: 0; transition: all .15s;\n}\n.profile-card:hover .profile-del { opacity: 1; }\n.profile-del:hover { color: var(--neg); border-color: var(--neg); background: var(--neg-soft); }\n\n.add-profile-btn {\n  border: 1px dashed var(--line-2);\n  background: transparent;\n  border-radius: var(--r-lg);\n  padding: 22px;\n  display: flex; flex-direction: column; gap: 10px;\n  align-items: center; justify-content: center;\n  text-align: center;\n  cursor: pointer; min-height: 100%;\n  transition: all .2s;\n  color: var(--ink-3);\n}\n.add-profile-btn .plus {\n  font-family: var(--font-serif); font-style: italic; font-size: 38px; line-height: 1;\n  color: var(--ink-4);\n}\n.add-profile-btn .lbl { font-size: 13px; font-weight: 500; color: var(--ink-2); }\n.add-profile-btn .hint { font-family: var(--font-mono); font-size: 10px;\n  color: var(--ink-4); letter-spacing: 0.14em; text-transform: uppercase; }\n.add-profile-btn:hover {\n  border-color: var(--blue); background: var(--blue-tint); color: var(--blue);\n}\n.add-profile-btn:hover .plus,\n.add-profile-btn:hover .lbl { color: var(--blue); }\n\n.ls-foot {\n  position: relative; z-index: 1;\n  margin-top: 60px;\n  padding-top: 22px;\n  border-top: 1px solid var(--line);\n  display: flex; justify-content: space-between; gap: 16px;\n  font-family: var(--font-mono); font-size: 10px;\n  color: var(--ink-4); letter-spacing: 0.18em; text-transform: uppercase;\n  flex-wrap: wrap;\n}\n\n/* ───────── APP ───────── */\n#app-screen { display: none; }\n.topbar {\n  background: rgba(15,23,39,0.85);\n  border-bottom: 1px solid var(--line);\n  padding: 12px 24px;\n  display: flex; align-items: center; gap: 18px;\n  position: sticky; top: 0; z-index: 100;\n  backdrop-filter: saturate(180%) blur(12px);\n}\n.topbar .mark .word { font-size: 19px; }\n.tb-sep {\n  width: 1px; height: 26px; background: var(--line);\n}\n.back-btn {\n  display: inline-flex; align-items: center; gap: 6px;\n  background: transparent;\n  border: 1px solid var(--line);\n  color: var(--ink-2);\n  border-radius: 8px; padding: 6px 11px;\n  font-size: 12px; cursor: pointer;\n  transition: all .15s;\n}\n.back-btn:hover { color: var(--ink); border-color: var(--ink-4); background: var(--sunk); }\n\n.tb-prof { display: flex; align-items: center; gap: 12px; }\n.tb-avatar {\n  width: 36px; height: 36px; aspect-ratio: 1 / 1;\n  border-radius: 50%;\n  display: grid; place-items: center;\n  font-size: 19px; line-height: 1;\n  background: var(--blue-tint); color: var(--blue);\n  border: 1px solid var(--line);\n}\n.tb-name { font-family: var(--font-serif); font-style: italic; font-size: 19px; letter-spacing: -0.01em; color: var(--ink); line-height: 1.1; }\n.tb-sub { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); letter-spacing: 0.1em; }\n\n.tb-right { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }\n\n.btn {\n  font-size: 12px; padding: 8px 13px;\n  border-radius: 8px; border: 1px solid var(--line);\n  background: var(--paper); color: var(--ink-2);\n  cursor: pointer; transition: all .15s;\n  display: inline-flex; align-items: center; gap: 6px;\n  white-space: nowrap; font-weight: 500;\n}\n.btn:hover { background: var(--sunk); color: var(--ink); border-color: var(--line-2); }\n.btn.primary {\n  background: var(--blue); color: #fff;\n  border-color: var(--blue);\n  font-weight: 600;\n  box-shadow: 0 6px 20px -8px rgba(78,123,255,0.6);\n}\n.btn.primary:hover { background: var(--blue-2); border-color: var(--blue-2); }\n.btn.ghost-blue { color: var(--blue); border-color: var(--blue-soft); background: var(--blue-tint); }\n.btn.ghost-blue:hover { background: var(--blue-soft); border-color: var(--blue); }\n.btn.danger { color: var(--neg); border-color: var(--neg-soft); background: var(--paper); }\n.btn.danger:hover { background: var(--neg-soft); border-color: var(--neg); }\n\n/* month bar */\n.month-bar {\n  background: var(--paper);\n  border-bottom: 1px solid var(--line);\n  padding: 0 24px;\n  display: flex; align-items: center; gap: 4px;\n  overflow-x: auto;\n  scrollbar-width: none;\n  position: sticky; top: 62px; z-index: 90;\n}\n.month-bar::-webkit-scrollbar { display: none; }\n.month-tab {\n  background: none; border: none;\n  font-size: 12px; font-weight: 500;\n  padding: 13px 14px;\n  color: var(--ink-3);\n  cursor: pointer; white-space: nowrap;\n  border-bottom: 2px solid transparent;\n  transition: all .15s;\n  font-family: inherit;\n  letter-spacing: 0.01em;\n}\n.month-tab:hover { color: var(--ink); }\n.month-tab.has-data { color: var(--ink-2); }\n.month-tab.has-data::after {\n  content: ''; display: inline-block;\n  width: 4px; height: 4px; border-radius: 50%;\n  background: var(--blue); margin-left: 5px; vertical-align: 3px;\n}\n.month-tab.active {\n  color: var(--ink); border-bottom-color: var(--ink);\n  font-weight: 600;\n}\n.month-tab.active::after { background: var(--blue); }\n.year-select {\n  margin-left: auto;\n  font-size: 12px; padding: 6px 28px 6px 12px;\n  border: 1px solid var(--line);\n  border-radius: 8px;\n  background: var(--paper); color: var(--ink-2);\n  appearance: none;\n  background-image: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 4l3 3 3-3' stroke='%237A859E' fill='none' stroke-width='1.5' stroke-linecap='round'/><\u002Fsvg>\");\n  background-repeat: no-repeat; background-position: right 10px center;\n  cursor: pointer;\n  font-family: var(--font-mono);\n  flex-shrink: 0;\n}\n\n/* main */\n.main { padding: 28px clamp(16px, 3vw, 32px) 80px; max-width: 1800px; margin: 0 auto; }\n\n.section-label {\n  display: flex; align-items: baseline; gap: 14px;\n  margin: 32px 0 12px;\n}\n.section-label:first-of-type { margin-top: 8px; }\n.section-label .sl-num {\n  font-family: var(--font-mono); font-size: 10px;\n  color: var(--ink-4); letter-spacing: 0.18em;\n}\n.section-label .sl-title {\n  font-family: var(--font-serif); font-style: italic;\n  font-size: 22px; letter-spacing: -0.01em; color: var(--ink);\n  line-height: 1.1;\n}\n.section-label .sl-hint {\n  font-size: 12px; color: var(--ink-3);\n  margin-left: auto;\n}\n.section-label .sl-line {\n  flex: 1; height: 1px; background: var(--line); align-self: center;\n}\n\n/* stat cards */\n.stats-grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));\n  gap: 10px;\n}\n.stats-grid.cols-3 { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }\n.stats-grid.cols-emo { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }\n.stats-grid.cols-fin { grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); }\n\n.stat-card {\n  position: relative;\n  background: var(--paper);\n  border: 1px solid var(--line);\n  border-radius: var(--r-lg);\n  padding: 16px 18px 18px;\n  transition: border-color .15s, transform .2s;\n  overflow: hidden;\n}\n.stat-card:hover { border-color: var(--line-2); }\n.stat-label {\n  font-family: var(--font-mono);\n  font-size: 9.5px;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  margin-bottom: 8px;\n  display: flex; align-items: center; gap: 6px;\n}\n.stat-label .dot-r { margin-left: auto; width: 6px; height: 6px; border-radius: 50%; background: var(--line-2); }\n.stat-val {\n  font-family: var(--font-serif);\n  font-weight: 400;\n  font-size: 34px;\n  line-height: 1.05;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n}\n.stat-val .pct,\n.stat-val .unit { font-family: var(--font-mono); font-size: 12px; vertical-align: 6px; color: var(--ink-3); margin-left: 3px; letter-spacing: 0.05em; }\n.stat-sub {\n  font-family: var(--font-mono);\n  font-size: 10px; color: var(--ink-4);\n  margin-top: 4px; letter-spacing: 0.06em;\n}\n\n.stat-val.pos { color: var(--pos); }\n.stat-val.neg { color: var(--neg); }\n.stat-val.blue { color: var(--blue); }\n.stat-val.plum { color: var(--plum); }\n.stat-val.warn { color: var(--warn); }\n.stat-val.teal { color: var(--teal); }\n.stat-val.gold { color: var(--warn); }\n.stat-val.purple { color: var(--plum); }\n\n/* finance capital card */\n.stat-card.finance-cap {\n  border-color: rgba(78,123,255,0.32);\n  background: linear-gradient(180deg, rgba(78,123,255,0.10) 0%, var(--paper) 70%);   <span class=\"sl-title\">Emotional Log<\u002Fspan>\n      <span class=\"sl-line\"><\u002Fspan>\n      <span class=\"sl-hint\">สถิติอารมณ์<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"stats-grid cols-emo\">\n      <div class=\"stat-card\"><div class=\"stat-label\">Calm · สงบ<\u002Fdiv><div class=\"stat-val blue\" id=\"e-calm\">0<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat-card\"><div class=\"stat-label\">FOMO<\u002Fdiv><div class=\"stat-val warn\" id=\"e-fomo\">0<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat-card\"><div class=\"stat-label\">Fear · กลัว<\u002Fdiv><div class=\"stat-val neg\" id=\"e-fear\">0<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat-card\"><div class=\"stat-label\">Confident · มั่นใจ<\u002Fdiv><div class=\"stat-val pos\" id=\"e-conf\">0<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat-card\"><div class=\"stat-label\">Greed · โลภ<\u002Fdiv><div class=\"stat-val plum\" id=\"e-greed\">0<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat-card\"><div class=\"stat-label\">Revenge · แก้ตัว<\u002Fdiv><div class=\"stat-val teal\" id=\"e-rev\">0<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FINANCE -->\n    <div class=\"section-label\">\n      <span class=\"sl-num\">04<\u002Fspan>\n      <span class=\"sl-title\">Capital &amp; Equity<\u002Fspan>\n      <span class=\"sl-line\"><\u002Fspan>\n      <span class=\"sl-hint\">การเงิน<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"stats-grid cols-fin\">\n      <div class=\"stat-card finance-cap\">\n        <div class=\"stat-label\">Initial Capital<span class=\"dot-r\" style=\"background:var(--blue)\"><\u002Fspan><\u002Fdiv>\n        <div class=\"cap-row\">\n          <span class=\"cap-prefix\">$<\u002Fspan>\n          <input class=\"cap-input\" type=\"number\" id=\"capital-input\" placeholder=\"10,000\" min=\"0\" step=\"100\" oninput=\"saveCapital()\">\n        <\u002Fdiv>\n        <div class=\"stat-sub\">เงินทุนเริ่มต้น<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat-card\">\n        <div class=\"stat-label\">Current Balance<\u002Fdiv>\n        <div class=\"cap-row\">\n          <span class=\"cap-prefix\" style=\"color:var(--ink-3)\">$<\u002Fspan>\n          <input class=\"cap-input\" type=\"number\" id=\"balance-input\" placeholder=\"0\" min=\"0\" step=\"100\" oninput=\"saveBalance()\" style=\"color:var(--ink)\">\n        <\u002Fdiv>\n        <div class=\"stat-sub\" id=\"s-balance-sub\">กรอกยอดปัจจุบัน<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat-card\"><div class=\"stat-label\">Equity (Computed)<\u002Fdiv><div class=\"stat-val\" id=\"s-equity\">—<\u002Fdiv><div class=\"stat-sub\" id=\"s-equity-pct\">—<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat-card\"><div class=\"stat-label\">PnL · Today<\u002Fdiv><div class=\"stat-val\" id=\"s-pnl-today\">$0.00<\u002Fdiv><div class=\"stat-sub\" id=\"s-pnl-today-sub\">—<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat-card\"><div class=\"stat-label\">PnL · Week<\u002Fdiv><div class=\"stat-val\" id=\"s-pnl-week\">$0.00<\u002Fdiv><div class=\"stat-sub\">สัปดาห์นี้<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat-card\"><div class=\"stat-label\">PnL · Month<\u002Fdiv><div class=\"stat-val\" id=\"s-pnl-month\">$0.00<\u002Fdiv><div class=\"stat-sub\">เดือนนี้<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- POSITION CALC -->\n    <div class=\"section-label\">\n      <span class=\"sl-num\">05<\u002Fspan>\n      <span class=\"sl-title\">Position Sizing<\u002Fspan>\n      <span class=\"sl-line\"><\u002Fspan>\n      <span class=\"sl-hint\">คำนวณขนาดไม้<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"calc-card\">\n      <div class=\"calc-grid\">\n        <div class=\"calc-group\"><label>Port / Capital ($)<\u002Flabel><input type=\"number\" id=\"pc-port\" placeholder=\"1,000\" step=\"100\" oninput=\"calcPos()\"><\u002Fdiv>\n        <div class=\"calc-group\"><label>Risk per Trade ($)<\u002Flabel><input type=\"number\" id=\"pc-risk\" placeholder=\"60\" step=\"1\" oninput=\"calcPos()\"><\u002Fdiv>\n        <div class=\"calc-group\"><label>Stop Loss (Pips)<\u002Flabel><input type=\"number\" id=\"pc-sl\" placeholder=\"100\" step=\"1\" oninput=\"calcPos()\"><\u002Fdiv>\n        <div class=\"calc-group\"><label>Risk % of Port<\u002Flabel><input type=\"number\" id=\"pc-riskpct\" placeholder=\"2\" step=\"0.5\" min=\"0.1\" max=\"100\" oninput=\"calcPos()\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"calc-results\">\n        <div class=\"calc-result\"><div class=\"calc-result-label\">Recommended Lot<\u002Fdiv><div class=\"calc-result-val\" id=\"pc-lot\">—<\u002Fdiv><\u002Fdiv>\n        <div class=\"calc-result\"><div class=\"calc-result-label\">Max Loss ($)<\u002Fdiv><div class=\"calc-result-val\" style=\"color:var(--pos)\" id=\"pc-maxloss\">—<\u002Fdiv><\u002Fdiv>\n        <div class=\"calc-result\"><div class=\"calc-result-label\">% of Port at Risk<\u002Fdiv><div class=\"calc-result-val\" style=\"color:var(--warn)\" id=\"pc-riskshow\">—<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- TABLE -->\n    <div class=\"section-label\">\n      <span class=\"sl-num\">06<\u002Fspan>\n      <span class=\"sl-title\">Trade Ledger<\u002Fspan>\n      <span class=\"sl-line\"><\u002Fspan>\n      <span class=\"sl-hint\">บันทึกไม้<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"tbl-card\">\n      <div class=\"tbl-header\">\n        <div class=\"tbl-count\"><b id=\"row-count\">0<\u002Fb> รายการ<\u002Fdiv>\n        <div class=\"search-wrap\">\n          <input class=\"search-input\" type=\"text\" placeholder=\"ค้นหา symbol, อารมณ์, เหตุผล...\" oninput=\"renderTable(this.value)\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tbl-wrap\">\n        <table>\n          <thead>\n            <tr>\n              <th>#<\u002Fth><th>วันที่<\u002Fth><th>เวลา<\u002Fth><th>No.<\u002Fth><th>Symbol<\u002Fth>\n              <th>Dir<\u002Fth><th>Zone (Orders × Lot)<\u002Fth><th>Total<\u002Fth>\n              <th>Entry<\u002Fth><th>Exit<\u002Fth><th>TP<\u002Fth><th>SL<\u002Fth><th>BE<\u002Fth><th>R:R<\u002Fth>\n              <th>เหตุผล Entry<\u002Fth><th>เหตุผล Exit<\u002Fth><th>อารมณ์บันทึก<\u002Fth>\n              <th>Result<\u002Fth><th>Emotion<\u002Fth><th>PnL<\u002Fth><th><\u002Fth>\n            <\u002Ftr>\n          <\u002Fthead>\n          <tbody id=\"tbl-body\"><\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══ TRADE FORM MODAL ══ -->\n<div class=\"overlay\" id=\"form-overlay\">\n  <div class=\"modal\">\n    <div class=\"modal-head\">\n      <div>\n        <div class=\"modal-eyebrow\">New Entry · No. <span id=\"form-num-disp\">—<\u002Fspan><\u002Fdiv>\n        <h2 id=\"form-title\">บันทึกไม้ใหม่<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"cur-time\" id=\"modal-clock\">—<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-grid\">\n      <div class=\"sec-label\"><span class=\"sec-num\">01<\u002Fspan><span class=\"sec-t\">Date &amp; Time<\u002Fspan><span class=\"sec-line\"><\u002Fspan><\u002Fdiv>\n      <div class=\"fg\"><label>วันที่<\u002Flabel><input type=\"date\" id=\"f-date\"><\u002Fdiv>\n      <div class=\"fg\"><label>เวลา<\u002Flabel><input type=\"time\" id=\"f-time\" step=\"1\"><\u002Fdiv>\n      <div class=\"fg\"><label>ไม้ที่ (ต่อวัน)<\u002Flabel><input type=\"number\" id=\"f-no\" placeholder=\"1\" min=\"1\"><\u002Fdiv>\n\n      <div class=\"sec-label\"><span class=\"sec-num\">02<\u002Fspan><span class=\"sec-t\">Trade<\u002Fspan><span class=\"sec-line\"><\u002Fspan><\u002Fdiv>\n      <div class=\"fg\"><label>Symbol<\u002Flabel>\n        <select id=\"f-sym\">\n          <option>XAUUSD<\u002Foption><option>XAGUSD<\u002Foption>\n          <option>EURUSD<\u002Foption><option>USDJPY<\u002Foption><option>อื่นๆ<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n      <div class=\"fg\"><label>Direction<\u002Flabel>\n        <select id=\"f-dir\" onchange=\"calcRR()\">\n          <option value=\"Buy\">Buy<\u002Foption><option value=\"Sell\">Sell<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n      <div class=\"fg full\" style=\"margin-top:2px\">\n        <label>Zone Orders — ระบุ Lot Size แต่ละ Order<\u002Flabel>\n        <div id=\"zone-orders-container\" style=\"display:flex;flex-direction:column;gap:8px;margin-top:6px\"><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:12px;margin-top:10px;flex-wrap:wrap\">\n          <button type=\"button\" class=\"btn ghost-blue\" style=\"font-size:11px;padding:6px 12px\" onclick=\"addZoneOrder()\">＋ เพิ่ม Order<\u002Fbutton>\n          <div id=\"zone-summary\" style=\"font-size:11px;color:var(--ink-3);font-family:var(--font-mono);letter-spacing:0.04em\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"sec-label\"><span class=\"sec-num\">03<\u002Fspan><span class=\"sec-t\">Price &amp; Risk<\u002Fspan><span class=\"sec-line\"><\u002Fspan><\u002Fdiv>\n      <div class=\"fg\"><label>ราคา Entry<\u002Flabel><input type=\"number\" id=\"f-entry\" placeholder=\"2300.00\" step=\"0.01\" oninput=\"calcRR()\"><\u002Fdiv>\n      <div class=\"fg\"><label>Take Profit<\u002Flabel><input type=\"number\" id=\"f-tp\" placeholder=\"2320.00\" step=\"0.01\"><\u002Fdiv>\n      <div class=\"fg\"><label>Stop Loss<\u002Flabel><input type=\"number\" id=\"f-sl\" placeholder=\"2290.00\" step=\"0.01\" oninput=\"calcRR();updateZoneSummary()\"><\u002Fdiv>\n      <div class=\"fg\"><label>Break Even<\u002Flabel><input type=\"number\" id=\"f-be\" placeholder=\"0.00\" step=\"0.01\"><\u002Fdiv>\n      <div class=\"fg\"><label>ราคา Exit<\u002Flabel><input type=\"number\" id=\"f-exit\" placeholder=\"0.00\" step=\"0.01\" oninput=\"calcRR()\"><\u002Fdiv>\n      <div class=\"fg\">\n        <label>R : R (อัตโนมัติ)<\u002Flabel>\n        <input type=\"text\" id=\"f-rr\" placeholder=\"—\" readonly=\"\" style=\"color:var(--blue);font-weight:600;font-family:var(--font-mono);\">\n        <div class=\"rr-hint\" id=\"rr-hint\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"sec-label\"><span class=\"sec-num\">04<\u002Fspan><span class=\"sec-t\">Journal<\u002Fspan><span class=\"sec-line\"><\u002Fspan><\u002Fdiv>\n      <div class=\"fg\"><label>Result<\u002Flabel>\n        <select id=\"f-result\" onchange=\"calcRR()\">\n          <option value=\"Win\">Win<\u002Foption><option value=\"Loss\">Loss<\u002Foption>\n          <option value=\"BE\">Break Even<\u002Foption><option value=\"Open\">Still Open<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n      <div class=\"fg\"><label>Emotion<\u002Flabel>\n        <select id=\"f-emo\">\n          <option value=\"สงบ\">Calm · สงบ<\u002Foption>\n          <option value=\"FOMO\">FOMO<\u002Foption>\n          <option value=\"กลัว\">Fear · กลัว<\u002Foption>\n          <option value=\"มั่นใจ\">Confident · มั่นใจ<\u002Foption>\n          <option value=\"โลภ\">Greed · โลภ<\u002Foption>\n          <option value=\"แก้ตัว\">Revenge · แก้ตัว<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n      <div class=\"fg\"><label>PnL ($)<\u002Flabel><input type=\"number\" id=\"f-pnl\" placeholder=\"120 หรือ -50\" step=\"0.01\"><\u002Fdiv>\n      <div class=\"fg full\"><label>เหตุผลในการ Entry<\u002Flabel><textarea id=\"f-rin\" placeholder=\"Breakout แนวต้าน, EMA crossover, RSI oversold...\"><\u002Ftextarea><\u002Fdiv>\n      <div class=\"fg full\"><label>เหตุผลในการ Exit<\u002Flabel><textarea id=\"f-rout\" placeholder=\"TP hit, candle กลับตัว, SL hit...\"><\u002Ftextarea><\u002Fdiv>\n      <div class=\"fg full\"><label>บันทึกอารมณ์ตอนเทรด<\u002Flabel><textarea id=\"f-rmood\" placeholder=\"ใจร้อน, รู้สึกกังวล, มั่นใจมาก, เครียด...\"><\u002Ftextarea><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"modal-footer\">\n      <button class=\"btn\" onclick=\"closeForm()\">ยกเลิก<\u002Fbutton>\n      <button class=\"btn primary\" onclick=\"saveEntry()\">บันทึก<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══ PROFILE MODAL ══ -->\n<div class=\"overlay\" id=\"profile-overlay\">\n  <div class=\"modal\" style=\"max-width:480px\">\n    <div class=\"modal-head\">\n      <div>\n        <div class=\"modal-eyebrow\">New Member<\u002Fdiv>\n        <h2>เพิ่มสมาชิกใหม่<\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"profile-form\">\n      <div>\n        <label class=\"f-label\">Display Name<\u002Flabel>\n        <input type=\"text\" id=\"pf-name\" class=\"f-input\" placeholder=\"เช่น Trading Pro...\" maxlength=\"30\">\n      <\u002Fdiv>\n      <div>\n        <label class=\"f-label\">เลือก Emoji<\u002Flabel>\n        <div class=\"emoji-picks\" id=\"emoji-picks\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <label class=\"f-label\">เลือกสีประจำตัว<\u002Flabel>\n        <div class=\"color-picks\" id=\"color-picks\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"modal-footer\">\n      <button class=\"btn\" onclick=\"closeProfileModal()\">ยกเลิก<\u002Fbutton>\n      <button class=\"btn primary\" onclick=\"saveNewProfile()\">สร้างโปรไฟล์<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- CONFIRM -->\n<div class=\"confirm-overlay\" id=\"confirm-overlay\">\n  <div class=\"confirm-box\">\n    <div class=\"glyph\">!<\u002Fdiv>\n    <p id=\"confirm-msg\">ต้องการลบรายการนี้?<\u002Fp>\n    <div class=\"btn-row\">\n      <button class=\"btn\" onclick=\"closeConfirm()\">ยกเลิก<\u002Fbutton>\n      <button class=\"btn danger\" id=\"confirm-ok\">ยืนยันลบ<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"toast\" id=\"toast\"><\u002Fdiv>\n\n<script>\n/* ══════════════════════════════════════════\n   BLUEBIRD · TRADING JOURNAL\n   Multi-profile · local storage · zone orders\n══════════════════════════════════════════ */\n\nconst PROFILES_KEY = 'xauusd_profiles_v1';\nconst MONTHS_TH = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];\nconst MONTHS_EN_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\nconst EMOJIS = ['🐦','🦋','🐱','🦊','🐻','🐼','🐨','🐰','🦉','🐧','🦄','🐹','🐯','🦁','🐶','🌙'];\nconst COLORS = ['#2E55E6','#1B3CC2','#0F3A6E','#384E7A','#2C7B7B','#1F7A8C','#4A6FA5','#0B7285','#5D7A8C','#3A4D7C'];\n\nlet profiles = [];\nlet currentProfile = null;\nlet trades = [];\nlet editIdx = -1;\nlet activeYear = new Date().getFullYear();\nlet activeMonth = new Date().getMonth() + 1;\nlet selectedEmoji = EMOJIS[0];\nlet selectedColor = COLORS[0];\nlet clockInterval = null;\n\n/* ── Helpers ── */\nfunction localDateStr(d) {\n  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');\n}\nfunction localTimeStr(d) {\n  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');\n}\nconst todayStr = localDateStr(new Date());\n\nfunction showToast(msg) {\n  const t = document.getElementById('toast');\n  t.textContent = msg; t.classList.add('show');\n  setTimeout(() => t.classList.remove('show'), 2200);\n}\nfunction openConfirm(msg, cb) {\n  document.getElementById('confirm-msg').textContent = msg;\n  document.getElementById('confirm-overlay').classList.add('open');\n  document.getElementById('confirm-ok').onclick = () => { closeConfirm(); cb(); };\n}\nfunction closeConfirm() { document.getElementById('confirm-overlay').classList.remove('open'); }\ndocument.addEventListener('keydown', e => { if(e.key === 'Escape') { closeForm(); closeConfirm(); closeProfileModal(); } });\n\n/* ── Profiles ── */\nfunction loadProfiles() {\n  try { profiles = JSON.parse(localStorage.getItem(PROFILES_KEY) || '[]'); } catch(e) { profiles = []; }\n}\nfunction saveProfiles() {\n  localStorage.setItem(PROFILES_KEY, JSON.stringify(profiles));\n}\nfunction tradesKey(pid) { return 'xauusd_trades_' + pid; }\nfunction capitalKey(pid) { return 'xauusd_capital_' + pid; }\nfunction balanceKey(pid) { return 'xauusd_balance_' + pid; }\nfunction profileSettingsKey(pid) { return 'xauusd_settings_' + pid; }\n\nfunction loadTrades(pid) {\n  try { trades = JSON.parse(localStorage.getItem(tradesKey(pid)) || '[]'); } catch(e) { trades = []; }\n}\nfunction saveTrades() {\n  localStorage.setItem(tradesKey(currentProfile.id), JSON.stringify(trades));\n  showToast('บันทึกแล้ว');\n}\n\n/* update landing meta */\nfunction updateLandingMeta() {\n  let totalVol = 0;\n  profiles.forEach(p => {\n    try {\n      const t = JSON.parse(localStorage.getItem(tradesKey(p.id)) || '[]');\n      totalVol += t.length;\n    } catch(e) {}\n  });\n  const now = new Date();\n  document.getElementById('m-vol').textContent = totalVol.toLocaleString();\n  document.getElementById('m-mem').textContent = profiles.length;\n  document.getElementById('m-mo').textContent = MONTHS_EN_SHORT[now.getMonth()] + ' ' + now.getFullYear();\n  document.getElementById('ls-clock').textContent = 'XAUUSD · ' + now.toLocaleDateString('en-US',{month:'short',day:'numeric'}).toUpperCase() + ' · LIVE';\n}\n\nfunction renderProfileScreen() {\n  loadProfiles();\n  updateLandingMeta();\n  const grid = document.getElementById('profile-grid');\n  // Always include the \"add\" tile\n  let cards = '';\n  if (!profiles.length) {\n    cards = `<div style=\"grid-column:1/-1;text-align:center;color:var(--ink-3);padding:14px 0;font-size:13px;font-family:var(--font-mono);letter-spacing:0.06em\">ยังไม่มีโปรไฟล์ — สร้างสมาชิกแรกของคุณ<\u002Fdiv>`;\n  } else {\n    cards = profiles.map(p => {\n      let trs = [];\n      try { trs = JSON.parse(localStorage.getItem(tradesKey(p.id)) || '[]'); } catch(e) {}\n      const wins = trs.filter(t => t.result==='Win').length;\n      const total = trs.filter(t => t.result==='Win'||t.result==='Loss').length;\n      const wr = total > 0 ? Math.round(wins/total*100) : null;\n      const pnl = trs.reduce((s,t) => s+(parseFloat(t.pnl)||0), 0);\n      const pnlStr = (pnl >= 0 ? '+' : '−') + '$' + Math.abs(pnl).toFixed(0);\n      const pnlCls = pnl > 0 ? 'pos' : pnl < 0 ? 'neg' : '';\n      return `\n        <div class=\"profile-card\" onclick=\"enterProfile('${p.id}')\">\n          <button class=\"profile-del\" onclick=\"event.stopPropagation();deleteProfile('${p.id}')\" title=\"ลบ\">×<\u002Fbutton>\n          <div class=\"pc-row\">\n            <div class=\"profile-avatar\" style=\"background:${p.color}14;color:${p.color};border-color:${p.color}33\">${p.emoji || p.name.charAt(0)}<\u002Fdiv>\n            <div>\n              <div class=\"profile-name\">${escapeHtml(p.name)}<\u002Fdiv>\n              <div class=\"profile-tagid\">Member · ${p.id.slice(-6).toUpperCase()}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"pc-stats\">\n            <div class=\"pc-stat\">\n              <span class=\"pc-stat-l\">Trades<\u002Fspan>\n              <span class=\"pc-stat-v\">${trs.length}<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"pc-stat\">\n              <span class=\"pc-stat-l\">Win Rate<\u002Fspan>\n              <span class=\"pc-stat-v\">${wr!==null?wr:'—'}${wr!==null?'<span class=\"pct\">%<\u002Fspan>':''}<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"pc-stat\">\n              <span class=\"pc-stat-l\">Net PnL<\u002Fspan>\n              <span class=\"pc-stat-v ${pnlCls}\">${pnlStr}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>`;\n    }).join('');\n  }\n  // Add tile\n  const addTile = `\n    <button class=\"add-profile-btn\" onclick=\"openProfileModal()\">\n      <div class=\"plus\">+<\u002Fdiv>\n      <div class=\"lbl\">เพิ่มสมาชิกใหม่<\u002Fdiv>\n      <div class=\"hint\">Create Profile<\u002Fdiv>\n    <\u002Fbutton>`;\n  grid.innerHTML = cards + addTile;\n}\n\nfunction escapeHtml(s) {\n  return (s||'').replace(/[&<>\"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[c]));\n}\n\nfunction enterProfile(pid) {\n  currentProfile = profiles.find(p => p.id === pid);\n  if (!currentProfile) return;\n  activeYear = new Date().getFullYear();\n  activeMonth = new Date().getMonth() + 1;\n  loadTrades(pid);\n  loadProfileSettings();\n  document.getElementById('profile-screen').style.display = 'none';\n  document.getElementById('app-screen').style.display = 'block';\n  const av = document.getElementById('tb-avatar');\n  av.textContent = currentProfile.emoji || currentProfile.name.charAt(0);\n  av.style.background = currentProfile.color + '14';\n  av.style.color = currentProfile.color;\n  av.style.borderColor = currentProfile.color + '33';\n  document.getElementById('tb-name').textContent = currentProfile.name;\n  const cap = localStorage.getItem(capitalKey(pid)) || '';\n  const bal = localStorage.getItem(balanceKey(pid)) || '';\n  document.getElementById('capital-input').value = cap;\n  document.getElementById('balance-input').value = bal;\n  startClock();\n  buildMonthBar();\n  renderTable();\n  updateStats();\n  window.scrollTo(0,0);\n}\n\nfunction loadProfileSettings() { /* no-op */ }\n\nfunction goBack() {\n  stopClock();\n  document.getElementById('app-screen').style.display = 'none';\n  document.getElementById('profile-screen').style.display = '';\n  renderProfileScreen();\n  window.scrollTo(0,0);\n}\n\nfunction deleteProfile(pid) {\n  openConfirm('ต้องการลบโปรไฟล์นี้และข้อมูลทั้งหมด?', () => {\n    profiles = profiles.filter(p => p.id !== pid);\n    saveProfiles();\n    localStorage.removeItem(tradesKey(pid));\n    localStorage.removeItem(capitalKey(pid));\n    localStorage.removeItem(balanceKey(pid));\n    localStorage.removeItem(profileSettingsKey(pid));\n    renderProfileScreen();\n    showToast('ลบโปรไฟล์แล้ว');\n  });\n}\n\n/* ── Profile Modal ── */\nfunction openProfileModal() {\n  selectedEmoji = EMOJIS[0];\n  selectedColor = COLORS[0];\n  document.getElementById('pf-name').value = '';\n  document.getElementById('emoji-picks').innerHTML = EMOJIS.map((e,i) =>\n    `<div class=\"emoji-pick${i===0?' active':''}\" onclick=\"pickEmoji('${e}',this)\">${e}<\u002Fdiv>`\n  ).join('');\n  document.getElementById('color-picks').innerHTML = COLORS.map((c,i) =>\n    `<div class=\"color-pick${i===0?' active':''}\" style=\"background:${c}\" onclick=\"pickColor('${c}',this)\" title=\"${c}\"><\u002Fdiv>`\n  ).join('');\n  document.getElementById('profile-overlay').classList.add('open');\n  setTimeout(() => document.getElementById('pf-name').focus(), 100);\n}\nfunction closeProfileModal() { document.getElementById('profile-overlay').classList.remove('open'); }\nfunction pickEmoji(e, el) {\n  selectedEmoji = e;\n  document.querySelectorAll('.emoji-pick').forEach(x => x.classList.remove('active'));\n  el.classList.add('active');\n}\nfunction pickColor(c, el) {\n  selectedColor = c;\n  document.querySelectorAll('.color-pick').forEach(x => x.classList.remove('active'));\n  el.classList.add('active');\n}\nfunction saveNewProfile() {\n  const name = document.getElementById('pf-name').value.trim();\n  if (!name) { showToast('กรุณาใส่ชื่อ'); return; }\n  const id = 'p_' + Date.now();\n  profiles.push({ id, name, emoji: selectedEmoji, color: selectedColor });\n  saveProfiles();\n  closeProfileModal();\n  renderProfileScreen();\n  showToast('สร้างโปรไฟล์ ' + name + ' แล้ว');\n}\n\n/* ── Clock ── */\nfunction startClock() {\n  stopClock();\n  function tick() {\n    const n = new Date();\n    const s = n.toLocaleDateString('th-TH', {weekday:'short',year:'numeric',month:'short',day:'numeric'}) + ' · ' + localTimeStr(n);\n    document.getElementById('tb-clock').textContent = s;\n    const mc = document.getElementById('modal-clock');\n    if (mc) mc.textContent = s;\n  }\n  tick();\n  clockInterval = setInterval(tick, 1000);\n}\nfunction stopClock() { if (clockInterval) { clearInterval(clockInterval); clockInterval = null; } }\n\n/* ── Capital / Balance ── */\nfunction saveCapital() {\n  const v = document.getElementById('capital-input').value;\n  if (currentProfile) localStorage.setItem(capitalKey(currentProfile.id), v);\n  updateStats();\n}\nfunction saveBalance() {\n  const v = document.getElementById('balance-input').value;\n  if (currentProfile) localStorage.setItem(balanceKey(currentProfile.id), v);\n  const cap = parseFloat(document.getElementById('capital-input').value) || 0;\n  const bal = parseFloat(v) || 0;\n  if (cap && bal) {\n    const diff = bal - cap;\n    const pct = (diff / cap * 100).toFixed(2);\n    document.getElementById('s-balance-sub').textContent = (diff >= 0 ? '+' : '−') + '$' + Math.abs(diff).toFixed(2) + ' (' + pct + '%)';\n  } else {\n    document.getElementById('s-balance-sub').textContent = 'กรอกยอดปัจจุบัน';\n  }\n  updateStats();\n}\n\n/* ── Month Bar ── */\nfunction buildMonthBar() {\n  const bar = document.getElementById('month-bar');\n  if (!bar) return;\n  const yearSet = new Set(trades.map(t => (t.date||'').slice(0,4)).filter(y=>y));\n  yearSet.add(String(new Date().getFullYear()));\n  const years = [...yearSet].map(Number).sort((a,b) => b-a);\n  let html = '';\n  const tabs = MONTHS_TH.map((m,i) => {\n    const mo = i+1;\n    const prefix = activeYear+'-'+String(mo).padStart(2,'0');\n    const hasTrades = trades.some(t => (t.date||'').startsWith(prefix));\n    const isActive = mo === activeMonth;\n    return `<button class=\"month-tab${isActive?' active':''}${hasTrades?' has-data':''}\" onclick=\"setMonth(${mo})\">${m}<\u002Fbutton>`;\n  }).join('');\n  let yearSel = `<select class=\"year-select\" id=\"year-sel\" onchange=\"changeYear(this.value)\">`;\n  years.forEach(y => { yearSel += `<option value=\"${y}\"${y===activeYear?' selected':''}>${y}<\u002Foption>`; });\n  yearSel += `<\u002Fselect>`;\n  bar.innerHTML = tabs + yearSel;\n}\nfunction setMonth(mo) { activeMonth = mo; buildMonthBar(); renderTable(); updateStats(); }\nfunction changeYear(y) { activeYear = parseInt(y); buildMonthBar(); renderTable(); updateStats(); }\n\n/* ── Table ── */\nfunction getMonthTrades() {\n  const prefix = activeYear+'-'+String(activeMonth).padStart(2,'0');\n  return trades.filter(t => (t.date||'').startsWith(prefix));\n}\nfunction emoClass(e) {\n  return {'สงบ':'emo-calm','FOMO':'emo-fomo','กลัว':'emo-fear','มั่นใจ':'emo-conf','โลภ':'emo-greed','แก้ตัว':'emo-rev'}[e]||'';\n}\nfunction resBadge(r) { return r==='Win'?'win':r==='Loss'?'loss':r==='Open'?'open-b':'be'; }\nfunction cut(s, n) { return s && s.length > n ? s.slice(0,n)+'…' : s||'—'; }\nfunction rrCls(r) { const v=parseFloat(r); if(!v||isNaN(v)) return 'rr-neu'; return v>=2?'rr-good':v>=1?'rr-ok':'rr-bad'; }\n\nfunction renderTable(q='') {\n  const body = document.getElementById('tbl-body');\n  const q2 = (q||'').toLowerCase();\n  const monthTrades = getMonthTrades();\n  const sorted = [...monthTrades].map(t => ({...t, _i: trades.indexOf(t)}))\n    .sort((a,b) => {\n      const dc = b.date.localeCompare(a.date); if(dc) return dc;\n      const tc = (b.time||'').localeCompare(a.time||''); if(tc) return tc;\n      return b.ts - a.ts;\n    });\n  const filtered = q2 ? sorted.filter(t =>\n    [t.date,t.time,t.symbol,t.dir,t.result,t.emo,t.rin,t.rout,t.entry,t.exit,t.lot,t.rr].join(' ').toLowerCase().includes(q2)\n  ) : sorted;\n  document.getElementById('row-count').textContent = filtered.length;\n  if (!filtered.length) {\n    body.innerHTML = `<tr class=\"empty-row\"><td colspan=\"21\"><span class=\"empty-glyph\">∅<\u002Fspan>${q2?'ไม่พบรายการที่ค้นหา':'ยังไม่มีบันทึก — กด \"บันทึกไม้ใหม่\" เพื่อเริ่มต้น'}<\u002Ftd><\u002Ftr>`;\n    return;\n  }\n  body.innerHTML = filtered.map((t, row) => {\n    const pnl = parseFloat(t.pnl)||0;\n    const pnlCls = pnl>0?'pnl-pos':pnl<0?'pnl-neg':'';\n    const pnlStr = pnl>0?'+$'+pnl.toFixed(2):pnl<0?'−$'+Math.abs(pnl).toFixed(2):'$0.00';\n    const rrDisp = t.rr?'1:'+t.rr:'—';\n    return `<tr>\n      <td style=\"color:var(--ink-4);font-family:var(--font-mono);font-size:10px\">${String(row+1).padStart(2,'0')}<\u002Ftd>\n      <td class=\"mono\" style=\"font-size:11px;color:var(--ink);white-space:nowrap\">${t.date||'—'}<\u002Ftd>\n      <td class=\"mono\" style=\"font-size:10px;color:var(--ink-3);white-space:nowrap\">${t.time||'—'}<\u002Ftd>\n      <td style=\"text-align:center;font-family:var(--font-mono);font-weight:600;color:var(--ink)\">${t.no||'—'}<\u002Ftd>\n      <td style=\"font-weight:600;color:var(--blue);font-family:var(--font-mono);letter-spacing:0.04em\">${t.symbol}<\u002Ftd>\n      <td><span class=\"badge ${t.dir==='Buy'?'buy':'sell'}\">${t.dir}<\u002Fspan><\u002Ftd>\n      <td class=\"mono\" style=\"font-size:11px;color:var(--ink-2)\">${formatZoneOrders(t.zoneOrders, t.lot)}<\u002Ftd>\n      <td class=\"mono\" style=\"font-weight:600;color:var(--ink)\">${calcTotalLot(t.zoneOrders, t.lot)}<\u002Ftd>\n      <td class=\"mono\">${t.entry||'—'}<\u002Ftd>\n      <td class=\"mono\">${t.exit||'—'}<\u002Ftd>\n      <td class=\"mono\" style=\"color:var(--ink-3)\">${t.tp||'—'}<\u002Ftd>\n      <td class=\"mono\" style=\"color:var(--ink-3)\">${t.sl||'—'}<\u002Ftd>\n      <td class=\"mono\" style=\"color:var(--ink-3)\">${t.be||'—'}<\u002Ftd>\n      <td class=\"${rrCls(t.rr)} mono\" style=\"font-size:11px\">${rrDisp}<\u002Ftd>\n      <td style=\"max-width:160px;font-size:11.5px;color:var(--ink-2)\">${cut(escapeHtml(t.rin),44)}<\u002Ftd>\n      <td style=\"max-width:160px;font-size:11.5px;color:var(--ink-2)\">${cut(escapeHtml(t.rout),44)}<\u002Ftd>\n      <td style=\"max-width:160px;font-size:11.5px;color:var(--ink-3);font-style:italic\">${cut(escapeHtml(t.rmood),44)}<\u002Ftd>\n      <td><span class=\"badge ${resBadge(t.result)}\">${t.result}<\u002Fspan><\u002Ftd>\n      <td><span class=\"badge ${emoClass(t.emo)}\">${t.emo||'—'}<\u002Fspan><\u002Ftd>\n      <td class=\"${pnlCls}\">${pnlStr}<\u002Ftd>\n      <td style=\"white-space:nowrap\"><div style=\"display:flex;gap:4px\">\n        <button class=\"btn\" style=\"font-size:10px;padding:4px 9px\" onclick=\"openForm(${t._i})\">แก้<\u002Fbutton>\n        <button class=\"btn danger\" style=\"font-size:10px;padding:4px 9px\" onclick=\"deleteEntry(${t._i})\">ลบ<\u002Fbutton>\n      <\u002Fdiv><\u002Ftd>\n    <\u002Ftr>`;\n  }).join('');\n}\n\n/* ── Stats ── */\nfunction updateStats() {\n  const mt = getMonthTrades();\n  const total = mt.length;\n  const buys = mt.filter(t=>t.dir==='Buy').length;\n  const sells = mt.filter(t=>t.dir==='Sell').length;\n  const wins = mt.filter(t=>t.result==='Win').length;\n  const losses = mt.filter(t=>t.result==='Loss').length;\n  const closed = wins+losses;\n  const wr = closed>0?Math.round(wins/closed*100)+'%':'—';\n  const pnl = mt.reduce((s,t)=>s+(parseFloat(t.pnl)||0),0);\n  const todayCount = mt.filter(t=>t.date===todayStr).length;\n  const rrList = mt.filter(t=>t.result==='Win'&&t.rr&&parseFloat(t.rr)>0);\n  const avgRR = rrList.length>0?(rrList.reduce((s,t)=>s+parseFloat(t.rr),0)/rrList.length).toFixed(2):null;\n  const bes = mt.filter(t=>t.result==='BE').length;\n  const emoCalm = mt.filter(t=>t.emo==='สงบ').length;\n  const emoFomo = mt.filter(t=>t.emo==='FOMO').length;\n  const emoFear = mt.filter(t=>t.emo==='กลัว').length;\n  const emoConf = mt.filter(t=>t.emo==='มั่นใจ').length;\n  const emoGreed = mt.filter(t=>t.emo==='โลภ').length;\n  const emoRev = mt.filter(t=>t.emo==='แก้ตัว').length;\n\n  document.getElementById('s-total').textContent = total;\n  document.getElementById('s-buy').textContent = buys;\n  document.getElementById('s-sell').textContent = sells;\n  document.getElementById('s-win').textContent = wins;\n  document.getElementById('s-loss').textContent = losses;\n  document.getElementById('s-be').textContent = bes;\n  document.getElementById('s-wr').innerHTML = wr;\n  document.getElementById('e-calm').textContent = emoCalm;\n  document.getElementById('e-fomo').textContent = emoFomo;\n  document.getElementById('e-fear').textContent = emoFear;\n  document.getElementById('e-conf').textContent = emoConf;\n  document.getElementById('e-greed').textContent = emoGreed;\n  document.getElementById('e-rev').textContent = emoRev;\n  const rrEl = document.getElementById('s-rr');\n  rrEl.textContent = avgRR!=null?'1 : '+avgRR:'—';\n  rrEl.className = 'stat-val '+(parseFloat(avgRR)>=2?'pos':parseFloat(avgRR)>=1?'blue':'neg');\n  document.getElementById('s-rr-sub').textContent = rrList.length?'จาก '+rrList.length+' ไม้ชนะ':'รอข้อมูล';\n  const pe = document.getElementById('s-pnl');\n  pe.textContent = (pnl>=0?'+':'−')+'$'+Math.abs(pnl).toFixed(2);\n  pe.className = 'stat-val '+(pnl>0?'pos':pnl<0?'neg':'');\n  document.getElementById('s-today').textContent = todayCount;\n\n  const todayPnl = trades.filter(t=>t.date===todayStr).reduce((s,t)=>s+(parseFloat(t.pnl)||0),0);\n  const n2 = new Date();\n  const weekStart = new Date(n2); weekStart.setDate(n2.getDate()-n2.getDay());\n  const weekStartStr = localDateStr(weekStart);\n  const weekPnl = trades.filter(t=>t.date>=weekStartStr&&t.date<=todayStr).reduce((s,t)=>s+(parseFloat(t.pnl)||0),0);\n  const monthStr = todayStr.slice(0,7);\n  const monthPnl = trades.filter(t=>t.date.startsWith(monthStr)).reduce((s,t)=>s+(parseFloat(t.pnl)||0),0);\n  const todayTrades = trades.filter(t=>t.date===todayStr).length;\n  const ptEl = document.getElementById('s-pnl-today');\n  ptEl.textContent = (todayPnl>=0?'+':'−')+'$'+Math.abs(todayPnl).toFixed(2);\n  ptEl.className = 'stat-val '+(todayPnl>0?'pos':todayPnl<0?'neg':'');\n  document.getElementById('s-pnl-today-sub').textContent = todayTrades+' ไม้วันนี้';\n  const pwEl = document.getElementById('s-pnl-week');\n  pwEl.textContent = (weekPnl>=0?'+':'−')+'$'+Math.abs(weekPnl).toFixed(2);\n  pwEl.className = 'stat-val '+(weekPnl>0?'pos':weekPnl<0?'neg':'');\n  const pmEl = document.getElementById('s-pnl-month');\n  pmEl.textContent = (monthPnl>=0?'+':'−')+'$'+Math.abs(monthPnl).toFixed(2);\n  pmEl.className = 'stat-val '+(monthPnl>0?'pos':monthPnl<0?'neg':'');\n\n  const allPnl = trades.reduce((s,t)=>s+(parseFloat(t.pnl)||0),0);\n  const cap = parseFloat(document.getElementById('capital-input').value)||0;\n  const equity = cap+allPnl;\n  const eqEl = document.getElementById('s-equity');\n  if(cap>0){\n    eqEl.textContent = '$'+equity.toFixed(2);\n    eqEl.className = 'stat-val '+(equity>cap?'pos':equity<cap?'neg':'');\n    const pct = ((equity-cap)/cap*100);\n    document.getElementById('s-equity-pct').textContent = (pct>=0?'+':'')+pct.toFixed(2)+'% from start';\n  } else {\n    eqEl.textContent = '—'; eqEl.className = 'stat-val';\n    document.getElementById('s-equity-pct').textContent = 'กรอกเงินทุนเพื่อคำนวณ';\n  }\n\n  const ct = [...trades].filter(t=>t.result==='Win'||t.result==='Loss')\n    .sort((a,b)=>{ const dc=a.date.localeCompare(b.date); if(dc)return dc; return(a.time||'').localeCompare(b.time||''); });\n  let maxW=0,maxL=0,curW=0,curL=0;\n  ct.forEach(t=>{ if(t.result==='Win'){curW++;curL=0;if(curW>maxW)maxW=curW;}else{curL++;curW=0;if(curL>maxL)maxL=curL;} });\n  document.getElementById('s-wstreak').textContent = maxW||0;\n  document.getElementById('s-lstreak').textContent = maxL||0;\n  if(ct.length>0){\n    const last = ct[ct.length-1].result;\n    let cur=0;\n    for(let i=ct.length-1;i>=0;i--){ if(ct[i].result===last)cur++;else break; }\n    const cEl = document.getElementById('s-curstreak');\n    cEl.textContent = (last==='Win'?'+':'−')+cur;\n    cEl.className = 'stat-val '+(last==='Win'?'pos':'neg');\n    document.getElementById('s-curstreak-sub').textContent = last==='Win'?'ชนะต่อเนื่อง':'แพ้ต่อเนื่อง';\n  } else {\n    document.getElementById('s-curstreak').textContent = '—';\n    document.getElementById('s-curstreak').className = 'stat-val';\n    document.getElementById('s-curstreak-sub').textContent = 'รอข้อมูล';\n  }\n}\n\n/* ── Position Calculator ── */\nfunction calcPos() {\n  const port = parseFloat(document.getElementById('pc-port').value);\n  const riskAmt = parseFloat(document.getElementById('pc-risk').value);\n  const sl = parseFloat(document.getElementById('pc-sl').value);\n  const riskPct = parseFloat(document.getElementById('pc-riskpct').value);\n  let effectiveRisk = riskAmt;\n  if((!riskAmt||isNaN(riskAmt))&&riskPct&&port) effectiveRisk = port*riskPct/100;\n  if(effectiveRisk>0&&sl>0){\n    const rawLot = effectiveRisk/(sl*1.0);\n    const lot = Math.floor(rawLot*100)/100;\n    const actualLoss = lot*sl*1.0;\n    const pct = port>0?(actualLoss/port*100).toFixed(2):'—';\n    document.getElementById('pc-lot').textContent = lot.toFixed(2)+' lot';\n    document.getElementById('pc-maxloss').textContent = '$'+actualLoss.toFixed(2);\n    document.getElementById('pc-riskshow').textContent = port>0?pct+'%':'—';\n  } else {\n    ['pc-lot','pc-maxloss','pc-riskshow'].forEach(id=>document.getElementById(id).textContent='—');\n  }\n}\n\n/* ── R:R ── */\nfunction calcRR() {\n  const entry = parseFloat(document.getElementById('f-entry').value);\n  const exit = parseFloat(document.getElementById('f-exit').value);\n  const sl = parseFloat(document.getElementById('f-sl').value);\n  const dir = document.getElementById('f-dir').value;\n  const result = document.getElementById('f-result').value;\n  const rrEl = document.getElementById('f-rr');\n  const hint = document.getElementById('rr-hint');\n  if(result!=='Win'&&result!=='Loss'){\n    rrEl.value='—'; hint.textContent='นับ R:R เฉพาะ Win / Loss'; hint.style.color='var(--ink-3)'; return '';\n  }\n  if(entry&&exit&&sl&&Math.abs(sl-entry)>0){\n    const sign = dir==='Buy'?1:-1;\n    const reward = sign*(exit-entry);\n    const risk = Math.abs(sl-entry);\n    const slOk = sign*(entry-sl)>0;\n    if(!slOk){ rrEl.value='⚠ SL ผิดทิศ'; hint.textContent='SL ต้องอยู่ใต้ Entry (Buy) หรือเหนือ (Sell)'; hint.style.color='var(--neg)'; return ''; }\n    const rr = reward/risk;\n    const rrStr = rr.toFixed(2);\n    rrEl.value = (rr>=0?'1 : ':'−1 : ')+Math.abs(rr).toFixed(2);\n    if(rr>=2){ hint.textContent='● R:R ดีมาก (≥ 1 : 2)'; hint.style.color='var(--pos)'; }\n    else if(rr>=1){ hint.textContent='● R:R พอใช้ (1:1 ~ 1:2)'; hint.style.color='var(--warn)'; }\n    else if(rr>0){ hint.textContent='● R:R ต่ำกว่า 1 : 1'; hint.style.color='var(--neg)'; }\n    else { hint.textContent='● Loss: −'+Math.abs(rr).toFixed(2)+' R'; hint.style.color='var(--neg)'; }\n    return rrStr;\n  }\n  rrEl.value=''; hint.textContent=''; return '';\n}\nfunction computeRR(entry,exit,sl,dir,result){\n  if(result!=='Win'&&result!=='Loss') return '';\n  const e=parseFloat(entry),x=parseFloat(exit),s=parseFloat(sl);\n  if(!e||!x||!s||Math.abs(s-e)===0) return '';\n  const sign=dir==='Buy'?1:-1;\n  const reward=sign*(x-e); const risk=Math.abs(s-e);\n  if(risk===0) return '';\n  return (reward/risk).toFixed(2);\n}\n\n/* ── Zone Orders ── */\nlet zoneOrderCount = 0;\n\nfunction addZoneOrder(lotVal='', entryVal='', tpVal='', noteVal='') {\n  zoneOrderCount++;\n  const id = 'zo_' + zoneOrderCount;\n  const container = document.getElementById('zone-orders-container');\n  const row = document.createElement('div');\n  row.className = 'zone-order-row';\n  row.dataset.zoid = id;\n  row.innerHTML = `\n    <div class=\"zone-order-num\">${container.children.length + 1}<\u002Fdiv>\n    <div class=\"zone-field\"><label>Lot Size<\u002Flabel><input type=\"number\" class=\"zo-lot\" placeholder=\"0.01\" step=\"0.01\" min=\"0.01\" value=\"${lotVal}\" oninput=\"updateZoneSummary()\"/><\u002Fdiv>\n    <div class=\"zone-field\"><label>Entry Price<\u002Flabel><input type=\"number\" class=\"zo-entry\" placeholder=\"2300.00\" step=\"0.01\" value=\"${entryVal}\" oninput=\"updateZoneSummary()\"/><\u002Fdiv>\n    <div class=\"zone-field\"><label>TP Price<\u002Flabel><input type=\"number\" class=\"zo-tp\" placeholder=\"2320.00\" step=\"0.01\" value=\"${tpVal}\" oninput=\"updateZoneSummary()\"/><\u002Fdiv>\n    <button type=\"button\" class=\"zone-order-del\" onclick=\"removeZoneOrder(this)\" title=\"ลบ\">×<\u002Fbutton>`;\n  container.appendChild(row);\n  renumberZoneOrders();\n  updateZoneSummary();\n}\n\nfunction removeZoneOrder(btn) {\n  const row = btn.closest('.zone-order-row');\n  row.remove();\n  renumberZoneOrders();\n  updateZoneSummary();\n}\n\nfunction renumberZoneOrders() {\n  const rows = document.querySelectorAll('#zone-orders-container .zone-order-row');\n  rows.forEach((r, i) => {\n    const num = r.querySelector('.zone-order-num');\n    if (num) num.textContent = i + 1;\n  });\n}\n\nfunction updateZoneSummary() {\n  const rows = document.querySelectorAll('#zone-orders-container .zone-order-row');\n  let totalLot = 0; let valid = 0;\n  rows.forEach(r => {\n    const lot = parseFloat(r.querySelector('.zo-lot').value) || 0;\n    if (lot > 0) { totalLot += lot; valid++; }\n  });\n  const sl = parseFloat(document.getElementById('f-sl').value) || 0;\n  let riskStr = '';\n  if (sl > 0 && totalLot > 0) {\n    const risk = totalLot * sl * 1.0;\n    riskStr = ` · Risk ~$${risk.toFixed(2)}`;\n  }\n  const el = document.getElementById('zone-summary');\n  el.textContent = rows.length > 0\n    ? `${valid} orders · Total ${totalLot.toFixed(2)} lot${riskStr}`\n    : 'ยังไม่มี order';\n}\n\nfunction getZoneOrdersData() {\n  const rows = document.querySelectorAll('#zone-orders-container .zone-order-row');\n  return Array.from(rows).map((r, i) => ({\n    no: i + 1,\n    lot: r.querySelector('.zo-lot').value,\n    entry: r.querySelector('.zo-entry').value,\n    tp: r.querySelector('.zo-tp').value\n  }));\n}\n\nfunction formatZoneOrders(zoneOrders, fallbackLot) {\n  if (!zoneOrders || !zoneOrders.length) {\n    return fallbackLot ? `1 × ${fallbackLot}` : '—';\n  }\n  return zoneOrders.map(o => o.lot || '?').join(' / ') + ' lot';\n}\n\nfunction calcTotalLot(zoneOrders, fallbackLot) {\n  if (!zoneOrders || !zoneOrders.length) return fallbackLot || '—';\n  const total = zoneOrders.reduce((s, o) => s + (parseFloat(o.lot) || 0), 0);\n  return total > 0 ? total.toFixed(2) : (fallbackLot || '—');\n}\n\n/* ── Trade Form ── */\nfunction openForm(idx) {\n  editIdx = idx!==undefined?idx:-1;\n  document.getElementById('form-title').textContent = editIdx>=0?'แก้ไขรายการ':'บันทึกไม้ใหม่';\n  const F = (id,val) => { const el=document.getElementById(id); if(el) el.value=val||''; };\n  const n = new Date();\n  document.getElementById('zone-orders-container').innerHTML = '';\n  zoneOrderCount = 0;\n\n  if(editIdx>=0){\n    const t = trades[editIdx];\n    F('f-date',t.date); F('f-time',t.time); F('f-no',t.no);\n    F('f-sym',t.symbol); F('f-dir',t.dir);\n    F('f-entry',t.entry); F('f-exit',t.exit); F('f-tp',t.tp); F('f-sl',t.sl); F('f-be',t.be);\n    F('f-result',t.result); F('f-emo',t.emo); F('f-pnl',t.pnl);\n    F('f-rin',t.rin); F('f-rout',t.rout); F('f-rmood',t.rmood);\n    document.getElementById('f-rr').value = t.rr?'1 : '+t.rr:'';\n    document.getElementById('rr-hint').textContent = '';\n    document.getElementById('form-num-disp').textContent = String(t.no || '—').padStart(2,'0');\n    if (t.zoneOrders && t.zoneOrders.length) {\n      t.zoneOrders.forEach(o => addZoneOrder(o.lot, o.entry, o.tp));\n    } else {\n      addZoneOrder(t.lot || '', t.entry || '');\n    }\n  } else {\n    ['f-entry','f-exit','f-tp','f-sl','f-be','f-pnl','f-rin','f-rout','f-rmood'].forEach(id=>F(id,''));\n    document.getElementById('f-rr').value = ''; document.getElementById('rr-hint').textContent = '';\n    F('f-date', localDateStr(n)); F('f-time', localTimeStr(n));\n    const nextNo = trades.filter(t=>t.date===localDateStr(n)).length+1;\n    F('f-no', nextNo);\n    document.getElementById('form-num-disp').textContent = String(nextNo).padStart(2,'0');\n    document.getElementById('f-sym').value='XAUUSD';\n    document.getElementById('f-dir').value='Buy';\n    document.getElementById('f-result').value='Win';\n    document.getElementById('f-emo').value='สงบ';\n    addZoneOrder();\n  }\n  updateZoneSummary();\n  document.getElementById('form-overlay').classList.add('open');\n}\nfunction closeForm() { document.getElementById('form-overlay').classList.remove('open'); }\nfunction saveEntry() {\n  const g = id => document.getElementById(id).value;\n  const zoneOrders = getZoneOrdersData();\n  const totalLot = zoneOrders.reduce((s, o) => s + (parseFloat(o.lot)||0), 0);\n  const firstEntry = zoneOrders.length > 0 ? (zoneOrders[0].entry || g('f-entry')) : g('f-entry');\n  const rrVal = computeRR(firstEntry, g('f-exit'), g('f-sl'), g('f-dir'), g('f-result'));\n  const entry = {\n    date:g('f-date'), time:g('f-time'), no:g('f-no'),\n    symbol:g('f-sym'), dir:g('f-dir'),\n    lot: totalLot > 0 ? totalLot.toFixed(2) : '',\n    zoneOrders,\n    entry:firstEntry, exit:g('f-exit'), tp:g('f-tp'), sl:g('f-sl'), be:g('f-be'),\n    rr:rrVal, result:g('f-result'), emo:g('f-emo'), pnl:g('f-pnl'),\n    rin:g('f-rin'), rout:g('f-rout'), rmood:g('f-rmood'), ts:Date.now()\n  };\n  if(!entry.date){ showToast('กรุณาเลือกวันที่'); return; }\n  if(editIdx>=0) trades[editIdx]=entry; else trades.push(entry);\n  closeForm(); saveTrades(); buildMonthBar(); renderTable(); updateStats();\n}\nfunction deleteEntry(i) {\n  openConfirm('ต้องการลบรายการนี้?', () => {\n    trades.splice(i,1); saveTrades(); buildMonthBar(); renderTable(); updateStats();\n  });\n}\n\n/* ── Export / Import CSV ── */\nfunction exportCSV() {\n  if(!trades.length){ showToast('ไม่มีข้อมูล'); return; }\n  const h = ['วันที่','เวลา','ไม้ที่','Symbol','Direction','Lot Size','Orders/Zone','Entry','Exit','TP','SL','BE','R:R','เหตุผล Entry','เหตุผล Exit','อารมณ์บันทึก','ผลลัพธ์','อารมณ์','PnL'];\n  const rows = [...trades].sort((a,b)=>b.date.localeCompare(a.date)).map(t => [\n    t.date,t.time||'',t.no,t.symbol,t.dir,t.lot||'',t.orders||'1',\n    t.entry,t.exit,t.tp,t.sl,t.be,t.rr?'1:'+t.rr:'',\n    '\"'+(t.rin||'').replace(/\"/g,\"'\")+'\"',\n    '\"'+(t.rout||'').replace(/\"/g,\"'\")+'\"',\n    '\"'+(t.rmood||'').replace(/\"/g,\"'\")+'\"',\n    t.result,t.emo,t.pnl\n  ].join(','));\n  const csv = '\\uFEFF'+[h.join(','),...rows].join('\\n');\n  const a = document.createElement('a');\n  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));\n  a.download = 'bluebird_'+(currentProfile?currentProfile.name+'_':'')+localDateStr(new Date())+'.csv';\n  a.click();\n  showToast('Export สำเร็จ');\n}\nfunction importTrigger() { document.getElementById('import-input').click(); }\nfunction importCSV(e) {\n  const file = e.target.files[0]; if(!file) return;\n  const reader = new FileReader();\n  reader.onload = ev => {\n    const lines = ev.target.result.replace(/^\\uFEFF/,'').split('\\n').filter(l=>l.trim());\n    let added = 0;\n    lines.slice(1).forEach(row => {\n      const cols = row.match(/(\".*?\"|[^,]*)(?:,|$)/g)||[];\n      const clean = cols.map(c=>(c||'').replace(/^,|,$/g,'').replace(/^\"|\"$/g,'').trim());\n      if(clean.length>=15&&clean[0]){\n        trades.push({\n          date:clean[0],time:clean[1]||'',no:clean[2],symbol:clean[3],dir:clean[4],\n          lot:clean[5]||'',orders:clean[6]||'1',\n          entry:clean[7],exit:clean[8],tp:clean[9],sl:clean[10],be:clean[11],\n          rr:(clean[12]||'').replace('1:',''),\n          rin:clean[13],rout:clean[14],rmood:clean[15]||'',\n          result:clean[16],emo:clean[17]||'',pnl:clean[18]||'',ts:Date.now()\n        });\n        added++;\n      }\n    });\n    if(added>0){ saveTrades(); buildMonthBar(); renderTable(); updateStats(); showToast('Import '+added+' รายการ'); }\n    else showToast('ไม่พบข้อมูลที่ถูกต้อง');\n    e.target.value='';\n  };\n  reader.readAsText(file,'UTF-8');\n}\n\n/* ── INIT ── */\nloadProfiles();\nrenderProfileScreen();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
